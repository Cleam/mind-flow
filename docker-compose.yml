services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mind-flow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mind_flow
      POSTGRES_INITDB_ARGS: "-c max_connections=100"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mind_flow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mind-flow-network

volumes:
  postgres_data:
    driver: local

networks:
  mind-flow-network:
    driver: bridge
